[build]
  command = "npm run build"
  publish = "dist"

[[headers]]
  for = "/assets/*.js"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"

[[headers]]
  for = "/assets/*.css"
  [headers.values]
    Content-Type = "text/css; charset=utf-8"

# Для favicon, изображений, json и т.д. обычно не нужно ничего — Netlify сам правильно определяет
# Но если очень хочется, можно добавить:
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"   # полезно для безопасности, но не трогает Content-Type

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200